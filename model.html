<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo 3D | Parada San Benito - FORCETECH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden}
    body{font-family:"DM Sans",sans-serif;background:#060a12;color:#d4f1d4}
    #canvas{width:100vw;height:100vh;display:block;cursor:grab}
    #canvas:active{cursor:grabbing}
    .legend{position:absolute;right:12px;bottom:12px;background:rgba(6,10,18,.88);border:1px solid rgba(39,174,96,.25);border-radius:6px;padding:8px 10px}
    .legend h3{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#27ae60;margin-bottom:6px;font-weight:700}
    .legend-item{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10px;color:#8ab88a}
    .swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .controls{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;flex-wrap:wrap;justify-content:center;gap:6px;background:rgba(6,10,18,.9);border:1px solid rgba(39,174,96,.3);border-radius:8px;padding:10px 16px}
    .btn{border:1px solid #27ae60;border-radius:5px;background:rgba(10,26,15,.95);color:#27ae60;font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;cursor:pointer;padding:8px 14px;transition:background .2s,box-shadow .2s;font-family:"DM Sans",sans-serif}
    .btn:hover{background:#27ae60;color:#fff}
    .btn.active{background:#27ae60;color:#fff;box-shadow:0 0 10px rgba(39,174,96,.5)}
    @media(max-width:760px){.legend{display:none}.controls{left:12px;right:12px;transform:none;max-width:calc(100vw - 24px)}}
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <a href="index.html" style="position:absolute;top:12px;left:12px;color:#d4703a;text-decoration:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Sans',sans-serif;background:rgba(6,10,18,.7);padding:6px 10px;border-radius:4px;border:1px solid rgba(39,174,96,.2)">&larr; FORCETECH</a>

  <div class="controls">
    <button class="btn" id="resetBtn">&cularr; Reset</button>
    <button class="btn" id="autoBtn">&orarr; Auto-Rotar</button>
    <button class="btn" id="wireBtn">&squ; Wireframe</button>
    <button class="btn" id="frontBtn">Frente</button>
    <button class="btn" id="sideBtn">Lateral</button>
    <button class="btn" id="topBtn">Planta</button>
    <button class="btn" id="isoBtn">ISO</button>
  </div>

  <div class="panel legend">
    <h3>Componentes</h3>
    <div class="legend-item"><span class="swatch" style="background:#b0c0c8"></span>Estructura Acero</div>
    <div class="legend-item"><span class="swatch" style="background:#8a9090"></span>Losa Concreto</div>
    <div class="legend-item"><span class="swatch" style="background:#182860"></span>Paneles Solares</div>
    <div class="legend-item"><span class="swatch" style="background:#3a7a3a"></span>Techo Verde</div>
    <div class="legend-item"><span class="swatch" style="background:#8b5c2a"></span>Madera (Banco)</div>
    <div class="legend-item"><span class="swatch" style="background:#5a3a1a"></span>Sustrato Xer&oacute;fito</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Scene ── */
    var canvas=document.getElementById("canvas");
    var scene=new THREE.Scene();
    scene.background=new THREE.Color(0x060a12);
    scene.fog=new THREE.FogExp2(0x060a12,0.015);

    var camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,200);
    var gl=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
    gl.setPixelRatio(Math.min(devicePixelRatio,2));
    gl.setSize(innerWidth,innerHeight);
    gl.shadowMap.enabled=true;
    gl.shadowMap.type=THREE.PCFSoftShadowMap;
    gl.toneMapping=THREE.ACESFilmicToneMapping;
    gl.toneMappingExposure=1.0;

    /* ── Lighting ── */
    scene.add(new THREE.AmbientLight(0x334466,0.7));
    var sun=new THREE.DirectionalLight(0xfff5e0,1.8);
    sun.position.set(8,15,6);sun.castShadow=true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.left=-12;sun.shadow.camera.right=12;
    sun.shadow.camera.top=12;sun.shadow.camera.bottom=-12;
    sun.shadow.camera.far=40;sun.shadow.bias=-0.001;sun.shadow.radius=2;
    scene.add(sun);
    var fill=new THREE.DirectionalLight(0x6688cc,0.35);
    fill.position.set(-6,4,-3);scene.add(fill);
    var rim=new THREE.PointLight(0xa8f0c0,0.5,20);
    rim.position.set(-3,6,-4);scene.add(rim);

    /* ── Adoquin texture ── */
    function makeAdoquinTex(){
      var c=document.createElement("canvas");c.width=512;c.height=512;
      var x=c.getContext("2d"),bw=46,bh=26;
      var tones=["#7a6855","#6e5e4a","#726050","#806858","#7c6450","#685848"];
      x.fillStyle="#221a12";x.fillRect(0,0,512,512);
      var rows=Math.ceil(512/bh)+1,cols=Math.ceil(512/bw)+2;
      for(var r=0;r<rows;r++){var off=(r%2)*(bw>>1);
        for(var cl=0;cl<cols;cl++){var px=cl*bw-off,py=r*bh;
          x.fillStyle=tones[(r*7+cl*13)%tones.length];
          x.fillRect(px+1,py+1,bw-2,bh-2);
          x.fillStyle="rgba(255,240,200,0.07)";x.fillRect(px+1,py+1,bw-2,3);
          x.fillStyle="rgba(255,240,200,0.04)";x.fillRect(px+1,py+1,2,bh-2);
          x.fillStyle="rgba(0,0,0,0.18)";x.fillRect(px+1,py+bh-4,bw-2,3);
        }
      }
      var t=new THREE.CanvasTexture(c);
      t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(12,8);return t;
    }

    /* ── Materials ── */
    var M={
      steel:new THREE.MeshStandardMaterial({color:0xb0c0c8,roughness:.25,metalness:.85}),
      conc:new THREE.MeshStandardMaterial({color:0x8a9090,roughness:.85,metalness:.05}),
      wood:new THREE.MeshStandardMaterial({color:0x8b5c2a,roughness:.7,metalness:.02}),
      solar:new THREE.MeshStandardMaterial({color:0x182860,roughness:.15,metalness:.7}),
      cell:new THREE.MeshStandardMaterial({color:0x1a4080,roughness:.1,metalness:.8}),
      green:new THREE.MeshStandardMaterial({color:0x3a7a3a,roughness:.8,metalness:0}),
      soil:new THREE.MeshStandardMaterial({color:0x5a3a1a,roughness:1,metalness:0}),
      pave:new THREE.MeshStandardMaterial({map:makeAdoquinTex(),roughness:.92,metalness:0}),
      trash:new THREE.MeshStandardMaterial({color:0x2d5f2d,roughness:.5,metalness:.3}),
      glass:new THREE.MeshStandardMaterial({color:0x4da8cc,roughness:.05,metalness:.1,transparent:true,opacity:.2}),
      water:new THREE.MeshStandardMaterial({color:0x4da8cc,roughness:.3,metalness:.2}),
      sign:new THREE.MeshStandardMaterial({color:0x1a3050}),
      signF:new THREE.MeshStandardMaterial({color:0x4da8cc})
    };
    var allMats=Object.values(M);

    /* ── Helpers ── */
    function bx(w,h,d,mat,x,y,z){var o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);o.position.set(x||0,y||0,z||0);o.castShadow=true;o.receiveShadow=true;scene.add(o);return o}
    function cy(rt,rb,h,seg,mat,x,y,z){var o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);o.position.set(x||0,y||0,z||0);o.castShadow=true;o.receiveShadow=true;scene.add(o);return o}

    /* ── Ground (adoquin) ── */
    var gnd=new THREE.Mesh(new THREE.PlaneGeometry(24,16),M.pave);
    gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);

    /* ── Water infiltration ── */
    for(var i=0;i<10;i++)bx(.06,.015,3,M.water,-3+i*.7,.008,0);

    /* ── Back wall ── */
    bx(.25,3.8,4.2,M.conc,-4,1.9,0);
    for(var i=0;i<7;i++)bx(.02,.03,3.8,new THREE.MeshBasicMaterial({color:0x6a7878}),-3.86,.5+i*.5,0);

    /* ── Steel columns ── */
    [[-3.3,-1.8],[-3.3,1.8],[3.3,-1.8],[3.3,1.8]].forEach(function(p){cy(.08,.12,4,8,M.steel,p[0],2,p[1])});

    /* ── Diagonal braces ── */
    function brace(a,b){
      var d=new THREE.Vector3().subVectors(new THREE.Vector3(b[0],b[1],b[2]),new THREE.Vector3(a[0],a[1],a[2]));
      var len=d.length();
      var m=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,len,6),M.steel);
      m.position.set((a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2);
      m.lookAt(new THREE.Vector3(b[0],b[1],b[2]));m.rotateX(Math.PI/2);
      m.castShadow=true;scene.add(m);
    }
    brace([-3.3,0,-1.8],[-3.3,3.5,-1.2]);
    brace([3.3,0,-1.8],[3.3,3.5,-1.2]);
    brace([-3.3,0,1.8],[-3.3,3.5,1.2]);
    brace([3.3,0,1.8],[3.3,3.5,1.2]);

    /* ── Roof ── */
    bx(8,.16,5,M.conc,0,4.05,0);
    bx(8.2,.06,5.2,M.steel,0,3.95,0);
    bx(8.2,.08,.06,M.steel,0,4.17,2.57);
    bx(8.2,.08,.06,M.steel,0,4.17,-2.57);
    bx(.06,.08,5.2,M.steel,4.07,4.17,0);
    bx(.06,.08,5.2,M.steel,-4.07,4.17,0);

    /* ── Green roof soil ── */
    bx(7,.12,4.2,M.soil,0,4.18,0);

    /* ── Solar panels ── */
    [[-2.2,4.35,-1.6],[2.2,4.35,-1.6],[-2.2,4.35,1.6],[2.2,4.35,1.6]].forEach(function(p,i){
      var pan=bx(1.5,.04,.9,M.solar,p[0],p[1],p[2]);
      pan.rotation.x=i<2?-.15:.15;
      for(var c=0;c<5;c++){var cl=bx(.24,.02,.75,M.cell,p[0]-.6+c*.3,p[1]+.02,p[2]);cl.rotation.x=i<2?-.15:.15}
    });

    /* ── Bench ── */
    bx(6,.08,1.2,M.wood,0,.55,-.5);
    [[-2.5,.3,-.5],[0,.3,-.5],[2.5,.3,-.5]].forEach(function(p){bx(.06,.5,.06,M.steel,p[0],p[1],p[2])});
    bx(6,.08,.5,M.wood,-.5,1,-1.4);
    bx(.06,.9,.06,M.steel,-2.5,.55,-1.4);
    bx(.06,.9,.06,M.steel,2.5,.55,-1.4);

    /* ── Glass panels ── */
    bx(.04,3,1.5,M.glass,-3.9,1.8,-.8);
    bx(.04,3,1.5,M.glass,-3.9,1.8,.8);

    /* ── Trash bin ── */
    bx(.45,.75,.45,M.trash,4,.45,-.8);
    bx(.5,.04,.5,M.steel,4,.87,-.8);
    cy(.1,.1,.02,6,M.signF,4,.92,-.8);

    /* ── Cactus ── */
    function cactus(x,z,h){cy(.1,.12,h,6,M.green,x,4.18+h/2,z);cy(.06,.06,h*.4,6,M.green,x+.15,4.18+h*.7,z)}

    /* ── Agave ── */
    function agave(x,z){
      for(var a=0;a<6;a++){var ang=a*Math.PI/3;var lf=bx(.06,.04,.35,M.green,x+Math.cos(ang)*.18,4.25,z+Math.sin(ang)*.18);lf.rotation.y=ang;lf.rotation.x=-.3}
      cy(.06,.08,.1,6,M.green,x,4.22,z);
    }

    cactus(-1.5,-.5,.7);cactus(1.8,.8,.9);cactus(-.5,1.2,.5);cactus(.8,-1,.6);
    agave(1,-.8);agave(-2,1);agave(.3,.5);agave(-.8,-1.3);

    /* ── Sign post ── */
    cy(.04,.04,2.5,6,M.steel,4.5,1.25,1.5);
    bx(.6,.4,.04,M.sign,4.5,2.5,1.5);
    bx(.5,.3,.02,M.signF,4.5,2.5,1.52);

    /* ── Desert hills ── */
    var hm=new THREE.MeshStandardMaterial({color:0x3a3020,roughness:1});
    var h1=new THREE.Mesh(new THREE.SphereGeometry(8,16,8,0,Math.PI*2,0,Math.PI/2),hm);h1.position.set(-10,-.5,-12);h1.scale.y=.3;scene.add(h1);
    var h2=new THREE.Mesh(new THREE.SphereGeometry(6,16,8,0,Math.PI*2,0,Math.PI/2),hm);h2.position.set(8,-.5,-14);h2.scale.y=.25;scene.add(h2);
    var h3=new THREE.Mesh(new THREE.SphereGeometry(10,16,8,0,Math.PI*2,0,Math.PI/2),hm);h3.position.set(2,-.5,-16);h3.scale.y=.2;scene.add(h3);

    /* ── Orbit camera ── */
    var orb={r:14,theta:.6,phi:1.1};
    var tgt=new THREE.Vector3(0,2,0);
    var autoRotate=false,wireMode=false,dragging=false,prevX=0,prevY=0;

    function updateCam(){
      camera.position.set(tgt.x+orb.r*Math.sin(orb.phi)*Math.cos(orb.theta),tgt.y+orb.r*Math.cos(orb.phi),tgt.z+orb.r*Math.sin(orb.phi)*Math.sin(orb.theta));
      camera.lookAt(tgt);
    }
    updateCam();

    canvas.addEventListener("pointerdown",function(e){dragging=true;prevX=e.clientX;prevY=e.clientY;canvas.setPointerCapture(e.pointerId)});
    canvas.addEventListener("pointerup",function(e){dragging=false;canvas.releasePointerCapture(e.pointerId)});
    canvas.addEventListener("pointermove",function(e){
      if(!dragging)return;
      orb.theta-=(e.clientX-prevX)*.008;
      orb.phi-=(e.clientY-prevY)*.008;
      orb.phi=Math.max(.15,Math.min(Math.PI-.15,orb.phi));
      prevX=e.clientX;prevY=e.clientY;updateCam();
    });
    canvas.addEventListener("wheel",function(e){e.preventDefault();orb.r=Math.max(4,Math.min(40,orb.r+e.deltaY*.03));updateCam()},{passive:false});
    canvas.addEventListener("contextmenu",function(e){e.preventDefault()});

    function camTo(x,y,z){var v=new THREE.Vector3(x,y,z).sub(tgt);orb.r=v.length();orb.theta=Math.atan2(v.z,v.x);orb.phi=Math.acos(v.y/orb.r);updateCam()}

    /* ── UI ── */
    document.getElementById("resetBtn").addEventListener("click",function(){orb.r=14;orb.theta=.6;orb.phi=1.1;tgt.set(0,2,0);autoRotate=false;updateBtns();updateCam()});
    document.getElementById("autoBtn").addEventListener("click",function(){autoRotate=!autoRotate;updateBtns()});
    document.getElementById("wireBtn").addEventListener("click",function(){wireMode=!wireMode;allMats.forEach(function(m){m.wireframe=wireMode});updateBtns()});
    document.getElementById("frontBtn").addEventListener("click",function(){camTo(0,3,12)});
    document.getElementById("sideBtn").addEventListener("click",function(){camTo(12,3,0)});
    document.getElementById("topBtn").addEventListener("click",function(){camTo(0,14,.1)});
    document.getElementById("isoBtn").addEventListener("click",function(){camTo(10,8,10)});

    function updateBtns(){document.getElementById("autoBtn").classList.toggle("active",autoRotate);document.getElementById("wireBtn").classList.toggle("active",wireMode)}

    window.addEventListener("resize",function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();gl.setSize(innerWidth,innerHeight)});

    function animate(){requestAnimationFrame(animate);if(autoRotate){orb.theta+=.005;updateCam()}gl.render(scene,camera)}
    animate();
  </script>
</body>
</html>
